name: audit

# The claims in the README are checked on a machine we do not control, on every push and every day.
# There is no certification body for an agent-memory library; the closest honest substitute is a public,
# reproducible audit whose failures are as visible as its passes. If this badge is red, believe the badge.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 5 * * *"        # daily, so a claim that rots is caught without a push
  workflow_dispatch:

jobs:
  claims:
    name: README claims (working tree)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: claims_audit
        run: python claims_audit.py --local
      - name: governance_audit
        run: python governance_audit.py --local

  falsification:
    name: the audit can actually fail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # An audit that cannot fail proves nothing. Disable the erasure and require the governance audit
      # to REPORT THE CLAIM BROKEN; a green run here would mean the checks measure nothing.
      - name: governance audit must fail when erasure is skipped
        run: |
          if GOV_FALSIFY=1 python governance_audit.py --local --repeats 1; then
            echo "::error::falsification control PASSED — the audit cannot fail, so it proves nothing"
            exit 1
          else
            echo "falsification control correctly reported CLAIM BROKEN"
          fi

  basestore-parity:
    name: InspeximusStore vs LangGraph's own store
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade langgraph langgraph-checkpoint-conformance pytest
      # "Drop-in BaseStore" is only true if a caller cannot tell the difference, so the same operation
      # scripts run against langgraph's InMemoryStore and against ours, and the results must match.
      - name: LangGraph's own checkpointer conformance suite (their docs say run it in CI)
        run: python checkpointer_conformance.py
      - run: python store_audit.py
      # the compliance surface must come off the framework object itself (mixin present, store not shadowed)
      - run: python -m pytest tests/test_governance_mixin.py -q
      - name: parity check must fail when writes are swallowed
        run: |
          if STORE_FALSIFY=1 python store_audit.py --repeats 1; then
            echo "::error::falsification control PASSED — the parity comparison proves nothing"
            exit 1
          fi

  adk-parity:
    name: InspeximusMemoryService vs ADK's own memory service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade google-adk pytest
      # ADK ships no conformance suite for BaseMemoryService, so the "drop-in" claim rests entirely on
      # this comparison against their own InMemoryMemoryService.
      - run: python adk_audit.py
      - run: python -m pytest tests/test_google_adk.py tests/test_governance_mixin.py -q
      - name: parity check must fail when ingestion is swallowed
        run: |
          if ADK_FALSIFY=1 python adk_audit.py --repeats 1; then
            echo "::error::falsification control PASSED — the parity comparison proves nothing"
            exit 1
          fi

  session-parity:
    name: InspeximusSession vs the Agents SDK's own session
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade openai-agents pytest
      - run: python session_audit.py
      - run: python -m pytest tests/test_governance_mixin.py -q
      - name: parity check must fail when writes are swallowed
        run: |
          if SESSION_FALSIFY=1 python session_audit.py --repeats 1; then
            echo "::error::falsification control PASSED — the parity comparison proves nothing"
            exit 1
          fi

  haystack-parity:
    name: InspeximusDocumentStore vs Haystack's own document store
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade haystack-ai pytest
      - run: python haystack_audit.py
      - run: python -m pytest tests/test_governance_mixin.py -q
      - name: parity check must fail when writes are swallowed
        run: |
          if HAYSTACK_FALSIFY=1 python haystack_audit.py --repeats 1; then
            echo "::error::falsification control PASSED — the parity comparison proves nothing"
            exit 1
          fi

  published:
    name: the PUBLISHED wheel from PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Audits the artifact users actually install, not the source in this repo.
      - name: claims_audit against PyPI
        run: python claims_audit.py | tee claims_report.txt
      - name: governance_audit against PyPI
        run: python governance_audit.py | tee governance_report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: |
            claims_report.txt
            governance_report.txt
