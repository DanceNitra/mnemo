name: release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token exists anywhere, and PyPI records a
# signed attestation binding the wheel to THIS repository, THIS workflow and THIS commit. That is the
# part a user can check: `pip download inspeximus` and the provenance says where it was built, rather
# than "the maintainer says he built it from the tagged source".
#
# One-time setup on PyPI (owner, web UI — cannot be done from here):
#   https://pypi.org/manage/project/inspeximus/settings/publishing/
#   Owner: DanceNitra · Repository: inspeximus · Workflow: release.yml · Environment: pypi
# After that, publishing needs no secret at all.

# The two LangGraph wrapper distributions version independently of the core, so they publish from
# their OWN tags (langgraph-store-inspeximus-v0.1.1) while the core keeps using v*. Both live in this
# one workflow file on purpose: PyPI's Trusted Publishing binds a project to a specific WORKFLOW
# FILENAME, and all three projects are registered against release.yml. A separate file would need a
# separate registration and would fail OIDC until someone remembered that.
on:
  push:
    tags: ["v*", "langgraph-*-v*", "adk-*-v*"]
  workflow_dispatch:
    inputs:
      package:
        description: "wrapper package to publish (leave blank for the core)"
        required: false
        type: choice
        options: ["", "langgraph-checkpoint-inspeximus", "langgraph-store-inspeximus", "adk-inspeximus"]
      mcp_registry:
        description: "publish only the MCP registry listing (uses the version in pyproject.toml)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  audit:
    # Never publish something the audits have not just passed on a clean runner.
    name: audits must pass first
    # "core tags start with v, anything else is a wrapper" -- naming the langgraph prefix here meant every
    # new wrapper family had to be added in four places, and a forgotten one publishes the CORE by mistake.
    if: ${{ !inputs.package && !inputs.mcp_registry && (github.ref_type != 'tag' || startsWith(github.ref_name, 'v')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python claims_audit.py --local
      - run: python governance_audit.py --local
      - name: falsification control must fail
        run: |
          if GOV_FALSIFY=1 python governance_audit.py --local --repeats 1; then
            echo "::error::falsification control passed — the audit proves nothing"; exit 1
          fi

  build:
    name: build sdist + wheel
    # "core tags start with v, anything else is a wrapper" -- naming the langgraph prefix here meant every
    # new wrapper family had to be added in four places, and a forgotten one publishes the CORE by mistake.
    if: ${{ !inputs.package && !inputs.mcp_registry && (github.ref_type != 'tag' || startsWith(github.ref_name, 'v')) }}
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - name: version in the artifact must match the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FOUND=$(ls dist/*.whl | sed -E 's/.*inspeximus-([0-9.]+)-.*/\1/')
          echo "tag=$TAG wheel=$FOUND"
          test "$TAG" = "$FOUND"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI (trusted, attested)
    # "core tags start with v, anything else is a wrapper" -- naming the langgraph prefix here meant every
    # new wrapper family had to be added in four places, and a forgotten one publishes the CORE by mistake.
    if: ${{ !inputs.package && !inputs.mcp_registry && (github.ref_type != 'tag' || startsWith(github.ref_name, 'v')) }}
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # the OIDC token that replaces the API key
      attestations: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  # ── the LangGraph wrapper distributions ──────────────────────────────────────────────────────────
  wrapper:
    name: publish a wrapper package
    if: ${{ inputs.package || (github.ref_type == 'tag' && !startsWith(github.ref_name, 'v')) }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: work out which package, from the tag or the dispatch input
        id: pick
        run: |
          if [ -n "${{ inputs.package }}" ]; then
            PKG="${{ inputs.package }}"
          else
            PKG="$(echo "${{ github.ref_name }}" | sed -E 's/-v[0-9].*$//')"
          fi
          test -d "packages/$PKG" || { echo "::error::no such package dir: packages/$PKG"; exit 1; }
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
      - run: python -m pip install --upgrade build
      - run: python -m build
        working-directory: packages/${{ steps.pick.outputs.pkg }}
      - name: the wrapper must import and re-export what it claims
        run: |
          python -m pip install packages/${{ steps.pick.outputs.pkg }}/dist/*.whl
          python packages/_check_wrapper.py "${{ steps.pick.outputs.pkg }}"
      - name: version in the artifact must match the tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="$(echo '${{ github.ref_name }}' | sed -E 's/^.*-v//')"
          FOUND="$(ls packages/${{ steps.pick.outputs.pkg }}/dist/*.whl | sed -E 's/.*-([0-9][0-9.]*)-py3.*/\1/')"
          echo "tag=$TAG wheel=$FOUND"
          test "$TAG" = "$FOUND"
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          packages-dir: packages/${{ steps.pick.outputs.pkg }}/dist/


  # ── the official MCP registry ────────────────────────────────────────────────────────────────────
  # The interactive `mcp-publisher login github` device flow would put a human in the loop on every
  # release. GitHub Actions OIDC authenticates as the repository owner instead, so the listing tracks the
  # releases by itself. The registry stores only METADATA and resolves the package from PyPI, so this runs
  # after the package is published and refuses to advertise a version PyPI is not serving yet.
  mcp-registry:
    name: publish the listing to the MCP registry
    if: ${{ inputs.mcp_registry || (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: server.json must name the version we just released
        run: python packages/_pin_server_json.py
      - name: install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz" | tar -xz mcp-publisher
          chmod +x mcp-publisher
      - name: the manifest must be valid before we claim anything
        run: ./mcp-publisher validate
      - name: refuse to advertise a version PyPI is not serving
        run: |
          VERSION="$(python -c "import json;print(json.load(open('server.json'))['version'])")"
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/inspeximus/$VERSION/json" > /dev/null; then
              echo "PyPI is serving $VERSION"; exit 0
            fi
            echo "waiting for PyPI to serve $VERSION ($i/30)"; sleep 20
          done
          echo "::error::PyPI never served $VERSION; not publishing a listing that points nowhere"
          exit 1
      - name: is this version already listed?
        id: state
        run: |
          curl -s "https://registry.modelcontextprotocol.io/v0.1/servers?search=inspeximus" -o reg.json || true
          python packages/_registry_state.py reg.json
      - run: ./mcp-publisher login github-oidc
        if: steps.state.outputs.already != 'true'
      - name: publish (skipped when the registry already has this exact version)
        if: steps.state.outputs.already != 'true'
        run: ./mcp-publisher publish
      - name: the listing must actually be there afterwards
        run: |
          # The registry accepts the publish before its search index catches up, so a single check right
          # after publishing fails on a listing that is in fact fine. Poll instead of guessing a sleep.
          for i in $(seq 1 20); do
            curl -s "https://registry.modelcontextprotocol.io/v0.1/servers?search=inspeximus" -o r.json
            if python -c "import json,sys;d=json.load(open('r.json'));sys.exit(0 if d['metadata']['count']>0 else 1)"; then
              python -c "import json;d=json.load(open('r.json'));s=d['servers'][0]['server'];print('listed:',s['name'],s['version'])"
              exit 0
            fi
            echo "not indexed yet ($i/20)"; sleep 15
          done
          echo "::error::published, but the registry still returns zero results for inspeximus"
          exit 1
