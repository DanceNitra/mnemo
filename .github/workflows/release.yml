name: release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token exists anywhere, and PyPI records a
# signed attestation binding the wheel to THIS repository, THIS workflow and THIS commit. That is the
# part a user can check: `pip download agora-mnemo` and the provenance says where it was built, rather
# than "the maintainer says he built it from the tagged source".
#
# One-time setup on PyPI (owner, web UI — cannot be done from here):
#   https://pypi.org/manage/project/agora-mnemo/settings/publishing/
#   Owner: DanceNitra · Repository: mnemo · Workflow: release.yml · Environment: pypi
# After that, publishing needs no secret at all.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    # Never publish something the audits have not just passed on a clean runner.
    name: audits must pass first
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python claims_audit.py --local
      - run: python governance_audit.py --local
      - name: falsification control must fail
        run: |
          if GOV_FALSIFY=1 python governance_audit.py --local --repeats 1; then
            echo "::error::falsification control passed — the audit proves nothing"; exit 1
          fi

  build:
    name: build sdist + wheel
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - name: version in the artifact must match the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FOUND=$(ls dist/*.whl | sed -E 's/.*agora_mnemo-([0-9.]+)-.*/\1/')
          echo "tag=$TAG wheel=$FOUND"
          test "$TAG" = "$FOUND"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI (trusted, attested)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # the OIDC token that replaces the API key
      attestations: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
